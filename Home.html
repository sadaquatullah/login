<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humsar</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body{
            background-image:url(wildlife.jpg);
            background-repeat: no-repeat;
            background-size: cover;    
        }
        
        .container{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            margin-top: 150px;
            background-color: transparent;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            text-emphasis-color: #111;
            width: 600px;
            height: auto;
            border: 1px solid black;

        }
        .login{
            display: flex;
        }
        .btn{
            display: flex;
            margin-top: 20px;
        }

        .white{
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Welcome to Humsar</h1>
        <div>
                <h1 class="text-center white">

                <p class="text-center white">Humsar is a platform that connects people with similar interests and hobbies. Join our community and start sharing your passions today!</p>
                <div class="btn">
                    <a href="login.html" class="white">Login</a>
                </div>
            </div>
        </div>

    </div>

        
</body>
</html>
