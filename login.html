<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            background-image: url("wildlife.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            font-family: Arial, Helvetica, sans-serif;
        }
       
        .white{
            color: white;
        }

        .container{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .card{
            margin-top: 150px;
            background-color: transparent;
            border-radius: 8px;
            padding: 30px;
            width: 300px;
            height: auto;
            border: 1px solid black;

        }

        .text-center{
            text-align: center;
            margin-bottom: 20px;
        }

        .btn{
            display: block;
            margin-top: 20px;
        }

        .login{
            display: flex;
            flex-direction: column;
        }

        input{
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid black;
            background-color: #d8d8d8;
        }
        button{
            background-color: #1b81da;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
        }
        button:hover{
            background-color: #053f37;
        }
    </style>
</head>
<body>
    <div class="container">

    
    <div class="card">
        <h2 class="white text-center">login</h2>


        
        <form class="login">
            <input type="email"name="" id="username" placeholder="Email">
            <input type="password" name="" id="password" placeholder="Password">
            <button type="submit" class="btn" onclick="handleLogin(event)">login</button>

        </form>
    </div>
</div>

<script>

    function handleLogin(event) {
        event.preventDefault(); // Prevent form submission
    
    // Get input values
    var user = document.getElementById("username").value;
    var pass = document.getElementById("password").value;

    console.log(user, pass);
    
    // Check credentials
    if (user === "admin@gmail.com" && pass === "1234") {
        alert("Login Successful!");
        window.location.href = "dashboard.html"; // Redirect on success
    } else {
        alert("Invalid Username or Password"); // Show error on failure
    }
}
  
    </script>

</body>
</html>
